<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pavan Meena 💼</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  background: black;
  color: white;
}

/* Intro Screen */
#intro {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}

#intro img {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  animation: zoom 3s ease;
}

@keyframes zoom {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

#intro h1 {
  margin-top: 20px;
}

/* Slides */
.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.active {
  display: flex;
}

.text {
  font-size: 1.8em;
  max-width: 700px;
}

/* Button */
button {
  position: absolute;
  bottom: 40px;
  padding: 12px 25px;
  border: none;
  background: gold;
  cursor: pointer;
  border-radius: 20px;
}
</style>
</head>

<body>

<!-- Intro -->
<div id="intro">
  <img src="myphoto.jpg" alt="Pavan">
  <h1>Pavan Meena</h1>
</div>

<!-- Slides -->
<div class="slide active"><div class="text" id="text0"></div></div>
<div class="slide"><div class="text" id="text1"></div></div>
<div class="slide"><div class="text" id="text2"></div></div>
<div class="slide"><div class="text" id="text3"></div></div>

<button onclick="nextSlide()">Next 💫</button>

<script>
const messages = [
  "Hi, I am Pavan Meena 💼",
  "Engineer from NIT Kurukshetra 🎓",
  "Working in a government department 🇮🇳",
  "Building discipline, strength & success 🚀"
];

let current = 0;

// Typing effect
function typeText(id, text, speed = 50) {
  let i = 0;
  let el = document.getElementById(id);
  el.innerHTML = "";

  function typing() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

// Start after intro
setTimeout(() => {
  document.getElementById("intro").style.display = "none";
  typeText("text0", messages[0]);
}, 3000);

function nextSlide() {
  let slides = document.querySelectorAll(".slide");

  if (current < slides.length - 1) {
    slides[current].classList.remove("active");
    current++;
    slides[current].classList.add("active");

    typeText("text" + current, messages[current]);
  }
}
</script>

</body>
</html>
